name: kanni-dev

services:
  db:
    image: postgres:18.4-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    restart: unless-stopped
    environment:
      POSTGRES_USER: kanni
      POSTGRES_PASSWORD: ${KANNI_DB_PASSWORD:?set KANNI_DB_PASSWORD in .env}
      POSTGRES_DB: kanni
    ports:
      - "127.0.0.1:5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanni -d kanni"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - kanni_dev_data:/var/lib/postgresql
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
    mem_limit: 768m
    cpus: 1.0

volumes:
  kanni_dev_data:
